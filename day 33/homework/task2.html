<html>
    <head>
        <title>my table</title>
    </head>
    <body>
        <table style="border:2px black solid;">
            <thead>
                <tr>
                    <th style="border:2px black solid;">Day</th>
                    <th style="border:2px black solid;">Subject</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td style="border:2px black solid;" rowspan="2">Monday</td>
                    <td style="border:2px black solid;">Math</td>
                </tr>
                <tr>
                    <td style="border:2px black solid;">Physics</td>
                </tr>
            </tbody>
        </table>
    </body>
</html>


<html>
    <head>
        <title>my table</title>
    </head>
    <body>
        <table style="border:2px black solid;">
            <thead>
                <tr>
                    <th style="border:2px black solid;">Time</th>
                    <th style="border:2px black solid;">Monday</th>
                    <th style="border:2px black solid;">Tuesday</th>
                    <th style="border:2px black solid;">Wednesday</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td style="border:2px black solid;">09:00</td>
                    <td style="border:2px black solid;" rowspan="2">Math</td>
                    <td style="border:2px black solid;">English</td>
                    <td style="border:2px black solid;" rowspan="3">Programming</td>
                </tr>
                <tr>
                    <td style="border:2px black solid;">10:00</td>
                    <td style="border:2px black solid;">History</td>
                </tr>
                <tr>
                    <td style="border:2px black solid;">11:00</td>
                    <td style="border:2px black solid;" colspan="2">Sports</td>
                </tr>
                <tr>
                    <td style="border:2px black solid;">12:00</td>
                    <td style="border:2px black solid;">Physics</td>
                    <td style="border:2px black solid;">Chemistry</td>
                    <td style="border:2px black solid;">Biology</td>
                </tr>
            </tbody>
        </table>
    </body>
</html>
