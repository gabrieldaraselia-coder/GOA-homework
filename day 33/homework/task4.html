<html>
    <head>
        <title>my table</title>
    </head>
    <body>
        <table style="border:2px black solid;">
            <thead>
                <tr>
                    <th style="border:2px black solid;" rowspan="3" colspan="2">Department</th>
                    <th style="border:2px black solid;" rowspan="3">Year</th>
                    <th style="border:2px black solid;" colspan="6">Exam Results</th>
                </tr>
                <tr>
                    <th style="border:2px black solid;" colspan="2">Semester 1</th>
                    <th style="border:2px black solid;" colspan="2">Semester 2</th>
                    <th style="border:2px black solid;" colspan="2">Final</th>
                </tr>
                <tr>
                    <th style="border:2px black solid;">Theory</th>
                    <th style="border:2px black solid;">Practical</th>

                    <th style="border:2px black solid;">Practical</th>
                    <th style="border:2px black solid;">Average</th>
                    <th style="border:2px black solid;">Status</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td style="border:2px black solid;" rowspan="2" colspan="2">Computer Science</td>
                    <td style="border:2px black solid;">1</td>
                    <td style="border:2px black solid;">85</td>
                    <td style="border:2px black solid;">91</td>
                    <td style="border:2px black solid;">88</td>
                    <td style="border:2px black solid;">93</td>
                    <td style="border:2px black solid;" rowspan="2">89.25</td>
                    <td style="border:2px black solid;" rowspan="2">Passed</td>
                </tr>
                <tr>
                    <td style="border:2px black solid;">2</td>
                    <td style="border:2px black solid;" colspan="2">Research Project</td>
                    <td style="border:2px black solid;">90</td>
                    <td style="border:2px black solid;">94</td>
                </tr>
                <tr>
                    <td style="border:2px black solid;" colspan="9">Academic Summary Complete</td>
                </tr>
            </tbody>
        </table>
    </body>
</html>
