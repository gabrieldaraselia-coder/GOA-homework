<html>
    <head>
        <title>my table</title>
    </head>
    <body>
        <table style="border:2px black solid;">
            <tbody>
                <tr>
                    <td style="border:2px black solid;" rowspan="4">1</td>
                    <td style="border:2px black solid;" colspan="3">2</td>
                    <td style="border:2px black solid;" rowspan="2">3</td>
                </tr>
                <tr>
                    <td style="border:2px black solid;" rowspan="2">4</td>
                    <td style="border:2px black solid;" colspan="2">5</td>
                </tr>
                <tr>
                    <td style="border:2px black solid;" rowspan="2">6</td>
                    <td style="border:2px black solid;">7</td>
                    <td style="border:2px black solid;">8</td>
                </tr>
                <tr>
                    <td style="border:2px black solid;">9</td>
                    <td style="border:2px black solid;">10</td>
                    <td style="border:2px black solid;">11</td>
                </tr>
                <tr>
                    <td style="border:2px black solid;" colspan="2" rowspan="2">12</td>
                    <td style="border:2px black solid;">13</td>
                    <td style="border:2px black solid;" rowspan="2">14</td>
                    <td style="border:2px black solid;">15</td>
                </tr>
                <tr>
                    <td style="border:2px black solid;">16</td>
                    <td style="border:2px black solid;">17</td>
                </tr>
                <tr>
                    <td style="border:2px black solid;">18</td>
                    <td style="border:2px black solid;">19</td>
                    <td style="border:2px black solid;" colspan="3">BOSS LEVEL</td>
                </tr>
            </tbody>
        </table>
    </body>
</html>
