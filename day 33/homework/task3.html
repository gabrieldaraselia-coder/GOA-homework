<html>
    <head>
        <title>my table</title>
    </head>
    <body>
        <table style="border:2px black solid;">
            <thead>
                <tr>
                    <th style="border:2px black solid;" rowspan="2">ID</th>
                    <th style="border:2px black solid;" colspan="3">Personal Info</th>
                    <th style="border:2px black solid;" colspan="2">Performance</th>
                </tr>
                <tr>
                    <th style="border:2px black solid;">Name</th>
                    <th style="border:2px black solid;">Country</th>
                    <th style="border:2px black solid;">Role</th>
                    <th style="border:2px black solid;">Score</th>
                    <th style="border:2px black solid;">Rank</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td style="border:2px black solid;" rowspan="2">001</td>
                    <td style="border:2px black solid;" rowspan="2">nika</td>
                    <td style="border:2px black solid;">Georgia</td>
                    <td style="border:2px black solid;">Fronted</td>
                    <td style="border:2px black solid;">98</td>
                    <td style="border:2px black solid;">A</td>
                </tr>
                <tr>
                    <td style="border:2px black solid;" colspan="2">Full Stack Developer</td>
                    <td style="border:2px black solid;" colspan="2" rowspan="2">Outstanding Performance</td>
                </tr>
                <tr>
                    <td style="border:2px black solid;">002</td>
                    <td style="border:2px black solid;">Luka</td>
                    <td style="border:2px black solid;">Germany</td>
                    <td style="border:2px black solid;">Backend</td>
                </tr>
                <tr>
                    <td style="border:2px black solid;" colspan="6">End Of Report</td>
                </tr>
            </tbody>
        </table>
    </body>
</html>
