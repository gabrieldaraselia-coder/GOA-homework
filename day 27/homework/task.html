<!-- რისთვის გვჭირდება style ატრიბუტი? -->
<!-- რომ უფრო გავალამაზოთ ჩვენი საიტი -->

<!-- ჩამოთვალეთ და განმარტეთ ნასწავლი property-ები -->
<!-- color - შეიძლება ფერის შეცვლა-->
<!-- border - ქმნის ჩარჩოს -->
<!-- margin - არის დაშორება სიმბოლოებს შორის -->

<!-- ახსენით რა არის განსხვავება inline და block ელემენტებს შორის? -->
<!-- inline - ესეთი ტეგები იწერება ერთმანეთის გასწვრივ სანამ ადგილი არ ეყოფათ-->
<!-- block - არის ისეთი თეგები რომლებსაც ერთი ხაზი უკავიათ და ისინი გასწვრისვ არ ეწერებიან ერთმანეთს-->

<!-- შექმენით პარაგრამი, რომელსაც ექნება წითელი ფერი, ტექსტის ზომა 32px. -->
<html>
    <head>
        <title>my website</title>
    </head>
    <body>
        <p style="color: red;font-size: 32px;">Hello</p>
    </body>
</html>

<!-- შექმენით h1 ტექსტი იყოს ლურჯი, ზომაში 50px, იყოს ცენტრში -->
<html>
    <head>
        <title>my website</title>
    </head>
    <body>
        <h1  style="color: blue;font-size: 50px;text-align: center;">Hello</h1>
    </body>
</html>
