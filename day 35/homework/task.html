<!-- ახსენით რა არის Inheritance (მემკვიდრეობა) CSS-ში. მოიყვანეთ მაგალითი. -->
<!-- როცა მშობელი ელემენტის თვისება შვილზე გადადის -->
<!-- შექმენით div.
   - მიანიჭეთ color: red;
   - შიგნით დაამატეთ h1 და p
   - დააკვირდით როგორ გადაეცემა ფერი შვილ ელემენტებს -->
<html>
    <head>
        <title>div</title>
        <style>
            div{
                color: red;
            }
        </style>
    </head>
    <body>
        <div>
            <h1>hi</h1>
            <p>hello</p>
        </div>
    </body>
</html>


<!--  შექმენით div.
   - მიანიჭეთ font-size: 30px;
   - შიგნით დაამატეთ 3 პარაგრაფი
   - დააკვირდით როგორ გადაეცემა ზომა პარაგრაფებს -->
<html>
    <head>
        <title>div</title>
        <style>
            div{
                font-size: 30px;
            }
        </style>
    </head>
    <body>
        <div>
            <p>hello</p>
            <p>hello</p>
            <p>hello</p>
        </div>
    </body>
</html>


<!--  შექმენით 2 div.
   - პირველს მიანიჭეთ color: blue;
   - მეორეს მიანიჭეთ color: green;
   - თითოეულში დაამატეთ 2 პარაგრაფი -->
<html>
    <head>
        <title>div</title>
        <style>
            div{
                color: blue;
            }
            div{
                color: green;
            }
        </style>
    </head>
    <body>
        <div>
            <p>hello</p>
            <p>hello</p>
        </div>
                <div>
            <p>hello</p>
            <p>hello</p>
        </div>
    </body>
</html>


<!--  შექმენით div.
   - მიანიჭეთ:
     - color: purple;
     - text-align: center;
   - შიგნით დაამატეთ:
     - h1
     - p
     - button -->
<html>
    <head>
        <title>div</title>
        <style>
            div{
                color: purple;text-align: center;
            }
        </style>
    </head>
    <body>
        <div>
            <h1>hi</h1>
            <p>hello</p>
            <button>click me</button>
        </div>
    </body>
</html>


<!--  შექმენით div, რომლის შიგნით იქნება:
   - h1
   - p
   - b
   div-ს მიანიჭეთ:
   - color: orange;
   - font-size: 25px; -->
<html>
    <head>
        <title>div</title>
        <style>
            div{
                color: orange;font-size: 25px;
            }
        </style>
    </head>
    <body>
        <div>
            <h1>hi</h1>
            <p>hello</p>
            <button>click me</button>
        </div>
    </body>
</html>


<!--  შექმენით div, რომლის შიგნით იქნება 4 პარაგრაფი, ხოლო მის გარეთ 3 პარაგრაფი.
   - გამოიყენეთ:
     - div p
   - დივის ყველა პარაგრაფი გახადეთ ლურჯი -->
<html>
    <head>
        <title>div</title>
        <style>
            div p{
                color: blue;
            }
        </style>
    </head>
    <body>
        <p>hello</p>
        <p>hello</p>
        <p>hello</p>
        <div>
            <p>hello</p>
            <p>hello</p>
            <p>hello</p>
            <p>hello</p>
        </div>
    </body>
</html>


<!--  შექმენით div, რომლის შიგნით იქნება:
   - 2 პარაგრაფი
   - 1 h2
   - გამოიყენეთ:
     - div p
   - მხოლოდ პარაგრაფები გახადეთ მწვანე -->
<html>
    <head>
        <title>div</title>
        <style>
            div p{
                color: green;
            }
        </style>
    </head>
    <body>
        <div>
            <h2>hi</h2>
            <p>hello</p>
            <p>hello</p>
        </div>
    </body>
</html>


<!--  შექმენით div.
   - მიანიჭეთ color: red;
   - შიგნით დაამატეთ 3 პარაგრაფი
   შემდეგ ერთ პარაგრაფს მიანიჭეთ:
   - color: black; -->
<html>
    <head>
        <title>div</title>
        <style>
            div p{
                color: red;
            }
        </style>
    </head>
    <body>
        <div>
            <p>hello</p>
            <p>hello</p>
            <p style="color:black;">hello</p>
        </div>
    </body>
</html>
