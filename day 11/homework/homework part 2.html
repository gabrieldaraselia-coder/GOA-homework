<!-- ახსენით რისთვის არის საჭირო ფორმები ვებსაიტებზე და მოიყვანეთ 3 რეალური ვებგსაიტი სადაც ისინი შეგხვდათ -->
<!-- form გვეხმარება იმაში რომ მომხმარებლის ინფორმაცია გავუშვათ მონაცემთა ბაზაზე შემდეგ კი სერვერზე -->
<!-- ესეთი საიტებია მაგალითად: facebook,discord,instagram. -->



<!-- გაიხსენეთ დღეს ნასწავლი ინფუთის ტიპები, ახსენით რისთვის გამოიყენება თითოეული მათგანი -->
<!-- input type:name - სახელი უნდა ჩაწერო
                email - ემაილი უნდა ჩაწერო
                password - პაროლი უნდა ჩაწერო
                date - თარიღი უნდა ჩაწერო -->

<!-- გაიხსენეთ დღეს ნასწავლი ინფუთის ატრიბუტები, ახსენით რისთვის გამოიყენება თითოეული მათგანი -->
<!-- placeholder - ადგილს იკავებს და ინფორმაციას გვაძლევს თუ  რა ჩავწეროთ მაგალითად email or password -->
<!-- name - name-ის გარეშე input-ის ინფორმაცია დაიკარგება -->
<!-- required - ნიშნავს რომ აუცილებელია ჩაწერა -->



<!-- გაარკვიეთ კიდევ როგორი ინფუთის ტიპები არსებობს და რისთვის გამოიყენება -->
<!-- text - ტექსტის ჩასაწერად გამოიყენება
     number - ციფრების ჩასაწერად გამოიყენება
     submit - input-ის ინფორმაცია რომ არ დაიკარგოს გამოიყენება submit -->


<html>
    <body>
        <h1><strong>SIGN IN</strong></h1>
        <form>
            <br><br>
            <input type="email" placeholder="enter your email" name="email">
            <br><br>
            <input type="password" placeholder="enter your password" required name="password">
            <br><br>
            <input type="date" name="date">
            <input type="submit">
        </form>


        <h2>LOG IN</h2>

        <form>
            <input type="email" placeholder="email">
            <input type="password" placeholder="password">
            <input type="submit">
        </form>
    </body>
</html>
